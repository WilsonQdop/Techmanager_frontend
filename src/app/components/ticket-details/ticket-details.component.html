<div class="modal" *ngIf="show">
  <div class="modal-content">
    <h2>{{ ticket.title }}</h2>
    <p><strong>Descrição:</strong> {{ ticket.description }}</p>
    <p><strong>Categoria:</strong> {{ ticket.category }}</p>
    <p><strong>Prioridade:</strong> {{ ticket.priority }}</p>
    <p><strong>Status:</strong> {{ ticket.status }}</p>
    <p><strong>Valor:</strong> {{ ticket.value }}</p>
    <p><strong>Taxa Base:</strong> {{ ticket.baseHourlyRate }}</p>
    <p><strong>Cliente:</strong> {{ ticket.customerName }}</p>
    <p><strong>Técnico:</strong> {{ ticket.technicalName }}</p>

    <button (click)="assignToMe()">Atribuir-se</button>
    <button (click)="close()">Fechar</button>
  </div>
</div>
